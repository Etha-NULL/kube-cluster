apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mealie
  name: mealie
  namespace: mealie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mealie
  template:
    metadata:
      labels:
        app: mealie
    spec:
      securityContext:
        fsGroup: 33 # www-data group ID
        runAsUser: 33 # www-data user ID
        runAsGroup: 33 # www-data group ID 
				
        fsGroup: 911 # process group ID
        runAsUser: 911 # process user ID
        runAsGroup: 911  # process  group ID 


        
      containers:
      - image: ghcr.io/mealie-recipes/mealie:v3.10.2
        name: mealie
        
#        securityContext:
#          allowPrivilegeEscalation: false

        volumeMounts:
          - mountPath: "/etc/mealie-data"
            name: mealie-data
        ports:
        - containerPort: 9000


      volumes:
        - name: mealie-data
          persistentVolumeClaim:
            claimName: mealie-data

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mealie
  name: mealie
  namespace: mealie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mealie
  template:
    metadata:
      labels:
        app: mealie
    spec:
      securityContext:
#        fsGroup: 33  # www-data group ID
#        runAsUser: 33 # www-data user ID
#        runAsGroup: 911 # www-data group ID 
        
      containers:
      - image: ghcr.io/mealie-recipes/mealie:v3.10.2
        name: mealie
        
        securityContext:
          allowPrivilegeEscalation: false

        volumeMounts:
          - mountPath: "/app/mealie-data"
            name: mealie-data
        ports:
        - containerPort: 9000


      volumes:
        - name: mealie-data
          persistentVolumeClaim:
            claimName: mealie-data
